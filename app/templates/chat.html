{% extends "base.html" %}
{% block title %}Assistant{% endblock %}
{% block content %}
<section class="container-fluid px-3 px-lg-4 py-4">
    <div class="page-header">
        <div>
            <p class="eyebrow">Assistant</p>
            <h1>Railway Chat</h1>
        </div>
    </div>

    <section class="surface chat-shell mt-4">
        <div id="chatMessages" class="chat-messages">
            <div class="chat-message bot">Ask about bookings, fares, cancellations, PNR, or seat availability.</div>
        </div>
        <form id="chatForm" class="chat-form">
            <input class="form-control" id="chatInput" name="message" autocomplete="off" placeholder="Type your query">
            <button class="btn btn-primary" type="submit">Send</button>
        </form>
    </section>
</section>
{% endblock %}
