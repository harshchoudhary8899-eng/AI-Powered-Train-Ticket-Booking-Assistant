{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="auth-layout">
    <div class="surface auth-panel">
        <h1>Create Account</h1>
        <form method="post" class="stack-form">
            <div>
                <label class="form-label" for="name">Full name</label>
                <input class="form-control" id="name" name="name" autocomplete="name" required>
            </div>
            <div>
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
            </div>
            <div>
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
            </div>
            <div>
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-control" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
    </div>
</section>
{% endblock %}
